# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini as an agentic pair-programmer to design and implement the ranking algorithm, explore the datasets, design the honeypot discount and availability multipliers, and validate formatting compliance. No candidate profile data was sent to external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based candidate ranker with explicit reasoning generation. Candidates are filtered using a services-only consulting gate and a CV/Speech-only skill gate. Candidates are scored based on YOE alignment (5-9 years target), role title relevance (boosting core AI/ML/Search roles), narrative keyword match, and core skill proficiencies (including rare paraphrased skills for Tier 5 candidates). Behavioral and location metrics (activity recency, notice period, location willingness) are applied as multipliers. Subtle honeypot traps (zero-duration experts, calendar date mismatches, and excess skill duration relative to YOE) are discounted via a severity penalty. Runs in ~15 seconds on CPU.

